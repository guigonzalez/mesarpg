{% extends "base.html" %}

{% block title %}Editar Tipo de Personagem - {{ character_type.display_name }} - MesaRPG{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 mb-0">
                    <i class="fas fa-edit text-info"></i>
                    Editar Tipo de Personagem - {{ character_type.display_name }}
                </h1>
                <div>
                    <a href="{{ url_for('admin.character_types_list', system_id=character_type.system_id) }}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i>
                        Voltar
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12 col-md-8 col-lg-6 mx-auto">
            <div class="card shadow">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold text-info">
                        <i class="fas fa-edit"></i>
                        Editar Tipo de Personagem
                    </h6>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="form-group">
                            <label for="name">Nome (interno)</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ character_type.name }}" required>
                        </div>
                        <div class="form-group">
                            <label for="display_name">Nome de Exibição</label>
                            <input type="text" class="form-control" id="display_name" name="display_name" value="{{ character_type.display_name }}" required>
                        </div>
                        <div class="form-group">
                            <label for="description">Descrição</label>
                            <textarea class="form-control" id="description" name="description" rows="3">{{ character_type.description }}</textarea>
                        </div>
                        <div class="form-group">
                            <label for="sort_order">Ordem</label>
                            <input type="number" class="form-control" id="sort_order" name="sort_order" value="{{ character_type.sort_order }}">
                        </div>
                        <div class="form-group form-check">
                            <input type="checkbox" class="form-check-input" id="is_active" name="is_active" {% if character_type.is_active %}checked{% endif %}>
                            <label class="form-check-label" for="is_active">Ativo</label>
                        </div>
                        <button type="submit" class="btn btn-info">
                            <i class="fas fa-save"></i>
                            Salvar Alterações
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
